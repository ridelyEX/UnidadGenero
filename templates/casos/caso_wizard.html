{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="card">
    <div class="card-header">
        Paso {{ wizard.steps.step1 }} de {{ wizard.steps.count }}
    </div>

    <div class="card-body">
        <form action="" method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ wizard.management_form }}
            {{ wizard.form.as_p }}

            <div class="mt-3">
                {% if wizard.steps.prev %}
                    <button name="wizard_goto_step" type="submit" value="{{ wizard.steps.prev }}" class="btn btn-secondary">
                        Regresar
                    </button>
                {% endif %}

                <button type="submit" class="btn btn-primary">
                    {% if wizard.steps.current in "caso_si, caso_no, caso_cf, caso_cs, caso_otro" %}
                        Finalizar
                    {% else %}
                        Siguiente
                    {% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
